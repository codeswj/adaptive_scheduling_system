<!DOCTYPE html>

    <link rel="stylesheet" href="css/styles.css">

    <style>body{background:#f8fafc;} .panel{border-radius:14px;border:1px solid #dbe4f4;background:#fff;padding:1.5rem;box-shadow:var(--shadow-sm);} .toolbar select{margin-right:0.5rem;padding:0.6rem;border:1px solid #d5dfed;border-radius:10px;} .empty{color:#6171a5;margin-top:1rem;}</style>
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-header"><div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">TaskFlow</span></div></div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">Dashboard</a>

            <a href="operational-tasks.html" class="nav-item">Operational Task Monitor</a>
            <a href="leaderboard.html" class="nav-item">Top Performer Leaderboard</a>
