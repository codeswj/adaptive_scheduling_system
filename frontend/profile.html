<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TaskFlow</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            font-family: var(--font-body);
            color: #0f172a;
            background: var(--gradient-bg);
            min-height: 100vh;
        }

        .profile-shell {
            max-width: 980px;
            margin: 0 auto;
            padding: 2rem 1.25rem 3rem;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.4rem;
            color: #0f172a;
        }

        .profile-header h1,
        .profile-header .muted {
            color: #0f172a;
        }

        .profile-actions {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 999px;
            background: var(--gradient-cool);
            color: #fff;
            padding: 0.7rem 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(59, 130, 246, .24);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(96, 165, 250, 0.35);
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        }

        .card h3 {
            margin-bottom: 0.7rem;
            font-size: 1.1rem;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 0.7rem;
        }

        .form-group label {
            display: block;
            font-weight: 800;
            margin-bottom: 0.28rem;
            color: #0f172a;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 0.7rem 0.85rem;
            font-family: var(--font-body);
            color: #0f172a;
            font-weight: 700;
            background: #ffffff;
        }

        .stats-list {
            display: grid;
            gap: 0.75rem;
        }

        .stat-row {
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 0.85rem 1rem;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            gap: 0.6rem;
            color: #0f172a;
            font-weight: 700;
        }

        .muted {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
        }

        .status {
            margin-top: 0.5rem;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .status.error { color: #b42318; }
        .status.success { color: #15803d; }

        @media (max-width: 820px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="profile-shell">
        <div class="profile-header">
            <div>
                <h1>My Profile</h1>
                <div class="muted">View and update your account details</div>
            </div>
            <div class="profile-actions">
                <button class="btn" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
                <button class="btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="profile-grid">
            <section class="card">
                <h3>Profile Details</h3>
                <form id="profileForm" onsubmit="saveProfile(event)">
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input id="full_name" type="text" required>
                    </div>
                    <div class="form-group">
                        <label for="phone_number">Phone Number</label>
                        <input id="phone_number" type="text" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <input id="role" type="text" disabled>
                    </div>
                    <div class="form-group">
                        <label for="work_type">Work Type</label>
                        <select id="work_type" required>
                            <option value="boda_boda">Boda Boda</option>
                            <option value="market_vendor">Market Vendor</option>
                            <option value="artisan">Artisan</option>
                            <option value="domestic_worker">Domestic Worker</option>
                            <option value="plumber">Plumber</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input id="location" type="text" required>
                    </div>
                    <div class="form-group">
                        <label for="connectivity_profile">Connectivity Profile</label>
                        <select id="connectivity_profile">
                            <option value="2G">2G</option>
                            <option value="3G">3G</option>
                            <option value="4G">4G</option>
                            <option value="5G">5G</option>
                            <option value="unstable">Unstable</option>
                        </select>
                    </div>
                    <button class="btn" type="submit">Save Changes</button>
                </form>
                <div id="profileStatus" class="status"></div>
            </section>

            <section class="card">
                <h3>My Stats</h3>
                <div class="stats-list">
                    <div class="stat-row"><span>Total Tasks</span><strong id="statTotalTasks">0</strong></div>
                    <div class="stat-row"><span>Completed Tasks</span><strong id="statCompletedTasks">0</strong></div>
                    <div class="stat-row"><span>Pending Tasks</span><strong id="statPendingTasks">0</strong></div>
                    <div class="stat-row"><span>Total Earnings</span><strong id="statTotalEarnings">KSh 0</strong></div>
                    <div class="stat-row"><span>Joined</span><strong id="statCreatedAt">-</strong></div>
                    <div class="stat-row"><span>Last Login</span><strong id="statLastLogin">-</strong></div>
                </div>
            </section>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
