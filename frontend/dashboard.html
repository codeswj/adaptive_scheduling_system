<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskFlow</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">TaskFlow</span>
            </div>
        </div>
                <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">
                <span class="nav-icon">&#128202;</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="tasks.html" class="nav-item">
                <span class="nav-icon">&#10003;</span>
                <span class="nav-text">My Tasks</span>
                <span class="nav-badge" id="taskCount">0</span>
            </a>
            <a href="#" class="nav-item" onclick="showAddTaskModal()">
                <span class="nav-icon">+</span>
                <span class="nav-text">Add Task</span>
            </a>
            <a href="planner.html" class="nav-item">
                <span class="nav-icon">&#128197;</span>
                <span class="nav-text">Planner</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">&#128100;</span>
                <span class="nav-text">Profile</span>
            </a>
            <a href="#" class="nav-item" onclick="handleLogout()">
                <span class="nav-icon">&#8594;</span>
                <span class="nav-text">Logout</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot offline"></span>
                <span class="status-text">Offline Mode</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle" id="greetingText">Welcome back!</p>
            </div>
            <div class="header-right">
                <button class="mobile-logout-btn" onclick="handleLogout()">
                    Logout
                </button>
                <button class="sync-btn" onclick="syncTasks()" id="syncBtn">
                    <span class="sync-icon">⟳</span>
                    <span>Sync Now</span>
                </button>
                <div class="user-profile" id="userProfile">
                    <div class="user-avatar">
                        <span id="userInitials">JD</span>
                    </div>
                    <div class="user-info">
                        <div class="user-name" id="userName">John Doe</div>
                        <div class="user-role" id="userRole">Boda Boda</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card card-blue">
                <div class="stat-icon">📋</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
            </div>

            <div class="stat-card card-orange">
                <div class="stat-icon">⏱</div>
                <div class="stat-content">
                    <div class="stat-value" id="pendingTasks">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <div class="stat-card card-green">
                <div class="stat-icon">✓</div>
                <div class="stat-content">
                    <div class="stat-value" id="completedTasks">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <div class="stat-card card-purple">
                <div class="stat-icon">💰</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalEarnings">KSh 0</div>
                    <div class="stat-label">Total Earnings</div>
                </div>
            </div>
        </div>

        <!-- Today's Schedule -->
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">Today's Priority Tasks</h2>
                <button class="btn-text" onclick="window.location.href='tasks.html'">
                    View All →
                </button>
            </div>

            <div class="tasks-container" id="todayTasks">
                <!-- Tasks will be loaded here -->
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>No tasks for today</p>
                    <button class="btn-primary-small" onclick="showAddTaskModal()">Add Your First Task</button>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="content-section">
            <h2 class="section-title">Quick Actions</h2>
            <div class="quick-actions">
                <button class="action-card" onclick="showAddTaskModal()">
                    <span class="action-icon">+</span>
                    <span class="action-text">New Task</span>
                </button>
                <button class="action-card" onclick="window.location.href='planner.html'">
                    <span class="action-icon">&#128197;</span>
                    <span class="action-text">Planner Modules</span>
                </button>
                <button class="action-card" onclick="filterTasks('pending')">
                    <span class="action-icon">⏱</span>
                    <span class="action-text">View Pending</span>
                </button>
                <button class="action-card" onclick="filterTasks('completed')">
                    <span class="action-icon">✓</span>
                    <span class="action-text">View Completed</span>
                </button>
                <button class="action-card" onclick="syncTasks()">
                    <span class="action-icon">⟳</span>
                    <span class="action-text">Sync Data</span>
                </button>
            </div>
        </section>
    </main>

    <!-- Add Task Modal -->
    <div id="addTaskModal" class="modal">
        <div class="modal-backdrop" onclick="closeAddTaskModal()"></div>
        <div class="modal-container">
            <div class="modal-header">
                <h2>Add New Task</h2>
                <button class="modal-close" onclick="closeAddTaskModal()">✕</button>
            </div>
            <div class="modal-body">
                <form id="addTaskForm" onsubmit="handleAddTask(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task_title">Task Title *</label>
                            <input type="text" id="task_title" placeholder="e.g., Deliver package to CBD" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="task_type">Task Type</label>
                            <select id="task_type">
                                <option value="delivery">Delivery</option>
                                <option value="pickup">Pickup</option>
                                <option value="service">Service</option>
                                <option value="purchase">Purchase</option>
                                <option value="meeting">Meeting</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="task_urgency">Urgency</label>
                            <select id="task_urgency">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="task_location">Location</label>
                            <input type="text" id="task_location" placeholder="e.g., Nairobi CBD">
                        </div>

                        <div class="form-group">
                            <label for="task_payment">Payment (KSh)</label>
                            <input type="number" id="task_payment" placeholder="0" min="0">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="task_deadline">Deadline</label>
                            <input type="datetime-local" id="task_deadline">
                        </div>

                        <div class="form-group">
                            <label for="task_duration">Duration (mins)</label>
                            <input type="number" id="task_duration" placeholder="30" min="1">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="task_client">Client Name</label>
                            <input type="text" id="task_client" placeholder="Optional">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="task_notes">Notes</label>
                            <textarea id="task_notes" rows="3" placeholder="Additional details..."></textarea>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" onclick="closeAddTaskModal()">Cancel</button>
                        <button type="submit" class="btn-primary">
                            <span id="addTaskBtnText">Add Task</span>
                            <div class="btn-loader" style="display: none;"></div>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
