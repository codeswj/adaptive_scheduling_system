<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - TaskFlow</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .panel { border-radius: 14px; border: 1px solid #dbe4f4; background: #ffffff; box-shadow: var(--shadow-sm); padding: 1rem; margin-bottom: 1rem; }
        .section-title { margin-bottom: 0.5rem; }
        .user-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem; margin-top: 1rem; }
        .user-card h3 { margin: 0; }
        .user-card p { margin: 0.25rem 0; }
        .actions { margin-top: 0.75rem; }
        .btn-secondary { border: 1px solid #1f4bca; background: #ffffff; color: #1f4bca; border-radius: 999px; padding: 0.4rem 0.9rem; font-weight: 700; }
        .btn-secondary:hover { background: #1f4bca; color: #ffffff; }
    </style>
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">TaskFlow</span></div>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="user-management.html" class="nav-item active">
                <span class="nav-icon">👤</span>
                <span class="nav-text">User Management</span>
            </a>
            <a href="operational-tasks.html" class="nav-item">
                <span class="nav-icon">🛠️</span>
                <span class="nav-text">Operational Task Monitor</span>
            </a>
            <a href="leaderboard.html" class="nav-item">
                <span class="nav-icon">🏆</span>
                <span class="nav-text">Top Performer Leaderboard</span>
            </a>
            <a href="reminders.html" class="nav-item">
                <span class="nav-icon">⏳</span>
                <span class="nav-text">Reminder Queue (Next 24h)</span>
            </a>
            <a href="schedule-preview.html" class="nav-item">
                <span class="nav-icon">📆</span>
                <span class="nav-text">User Schedule Preview</span>
            </a>
            <a href="#" class="nav-item" onclick="handleLogout()">
                <span class="nav-icon">↗</span>
                <span class="nav-text">Logout</span>
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="dashboard-header">
            <div><h1 class="page-title">User Management</h1><p class="page-subtitle">Filter and inspect crews</p></div>
        </header>
        <section class="content-section">
            <div class="panel">
                <input type="text" placeholder="Search name or phone" style="width:100%; padding:0.6rem; border:1px solid #d5dfed; border-radius:10px; margin-bottom:0.75rem;">
                <div class="toolbar" style="flex-wrap:wrap;">
                    <select style="flex:1; padding:0.6rem; border-radius:10px; border:1px solid #d5dfed; margin-right:0.5rem;"><option>All status</option><option>Active</option><option>Inactive</option></select>
                    <select style="flex:1; padding:0.6rem; border-radius:10px; border:1px solid #d5dfed; margin-right:0.5rem;"><option>All work types</option><option>artisan</option><option>boda_boda</option></select>
                    <button class="btn btn-text" style="margin-left:auto;">Apply filters</button>
                </div>
                <div class="user-card">
                    <h3>Drake</h3>
                    <p>+254720202020 | artisan</p>
                    <p>Tasks: 6, Completed: 0</p>
                    <p>Status: Active</p>
                    <div class="actions"><button class="btn-secondary">Deactivate</button></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
